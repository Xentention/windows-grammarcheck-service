<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Коррекция текста</title>
<style>
  body { font-family: -apple-system, Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 16px; background:#f7f7f8; color:#1a1a1a; }
  h1 { font-size: 20px; }
  textarea { width: 100%; height: 200px; font-size: 15px; padding: 10px; box-sizing: border-box; font-family: inherit; resize: vertical; }
  button { margin-top: 12px; padding: 10px 24px; font-size: 15px; background:#2563eb; color:#fff; border:none; border-radius:6px; cursor:pointer; }
  button:hover:not(:disabled) { background:#1d4ed8; }
  button:disabled { background:#93b4ec; cursor:not-allowed; }
  .result { margin-top: 24px; padding: 16px; background:#fff; border:1px solid #ddd; border-radius:8px; white-space: pre-wrap; min-height: 24px; }
  .result.error { border-color:#dc2626; color:#dc2626; background:#fef2f2; }
  .label { font-weight: 600; margin-bottom: 6px; color:#555; }
  .timer { margin-top: 10px; color:#888; font-size: 13px; }
</style>
</head>
<body>
  <h1>Коррекция текста</h1>

  <div class="label">Исходный текст:</div>
  <textarea id="input" placeholder="Вставьте текст с ошибками..."></textarea>
  <br>
  <button id="submit-btn" type="button">Исправить</button>
  <div class="timer" id="timer"></div>

  <div class="label" style="margin-top:24px;">Исправленный текст:</div>
  <div class="result" id="output"></div>

<script>
  const input = document.getElementById("input");
  const button = document.getElementById("submit-btn");
  const output = document.getElementById("output");
  const timer = document.getElementById("timer");

  button.addEventListener("click", async () => {
    const text = input.value;
    if (!text.trim()) return;

    button.disabled = true;
    button.textContent = "Обработка...";
    output.classList.remove("error");
    output.textContent = "";
    timer.textContent = "";

    try {
      const response = await fetch("/correct", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text: text }),
      });
      const data = await response.json();
      output.textContent = data.corrected;
      timer.textContent = "Время обработки: " + data.elapsed_seconds_str;
    } catch (err) {
      output.classList.add("error");
      output.textContent = "Ошибка запроса: " + err;
    } finally {
      button.disabled = false;
      button.textContent = "Исправить";
    }
  });
</script>
</body>
</html>
