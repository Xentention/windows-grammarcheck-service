name: Build RuGrammarCheck exe 

on:
  workflow_dispatch:

permissions:
  contents: write 

jobs:
  build:
    runs-on: windows-2025

    steps:
      - name: Check out repo
        uses: nschloe/action-cached-lfs-checkout@v1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --no-cache-dir -r requirements-frozen.txt
          pip install pyinstaller

      - name: Prepare .env # copying non-secret env vars to the bundle (if needed) 
        shell: cmd
        run: |
          type nul > .env

      - name: Build exe
        shell: cmd
        run: |
          pyinstaller --name RuGrammarCheck --onedir --console ^
            --collect-all onnxruntime ^
            --exclude-module tkinter ^
            --add-data "models;models" ^
            --add-data "app/templates;app/templates" ^
            --add-data "app/static;app/static" ^
            --add-data "clipboard;clipboard" ^
            --add-data ".env;." ^
            launcher.py

      - name: Bundle NSSM
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://nssm.cc/ci/nssm-2.24-101-g897c7ad.zip" -OutFile nssm.zip
          Expand-Archive nssm.zip -DestinationPath nssm_extracted
          Copy-Item nssm_extracted\nssm-2.24-101-g897c7ad\win64\nssm.exe -Destination dist\RuGrammarCheck\nssm.exe
          Copy-Item install-service.bat -Destination dist\RuGrammarCheck\install-service.bat

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: RuGrammarCheck-windows
          path: dist/RuGrammarCheck/**
          if-no-files-found: error

      # only runs when triggered by a version tag

      - name: Zip build for release
        if: github.ref_type == 'tag'
        shell: cmd
        run: powershell Compress-Archive -Path dist\RuGrammarCheck\* -DestinationPath RuGrammarCheck-%GITHUB_REF_NAME%-windows.zip

      - name: Publish GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v3
        with:
          files: RuGrammarCheck-*-windows.zip
          generate_release_notes: true