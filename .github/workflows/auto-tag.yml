name: Auto Tag on Merge

on:
  pull_request:
    types: [closed]
    branches:
      - main

jobs:
  tag:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine bump type
        id: bump
        run: |
          BUMP="patch"

          #PR labels control bump type
          PR_LABELS="${{ join(github.event.pull_request.labels.*.name, ' ') }}"

          if echo "$PR_LABELS" | grep -q "bump: major"; then
            BUMP="major"
          elif echo "$PR_LABELS" | grep -q "bump: minor"; then
            BUMP="minor"
          fi

          echo "type=$BUMP" >> "$GITHUB_OUTPUT"

      - name: Get latest semver tag and compute next version
        id: semver
        run: |
          LATEST_TAG=$(git tag -l 'v*' --sort=-v:refname | head -n1)

          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v0.0.0"
          fi

          VER="${LATEST_TAG#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VER"

          CASE="${{ steps.bump.outputs.type }}"
          case "$CASE" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch|*)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEXT="v${MAJOR}.${MINOR}.${PATCH}"
          echo "previous=$LATEST_TAG" >> "$GITHUB_OUTPUT"
          echo "next=$NEXT" >> "$GITHUB_OUTPUT"

      - name: Create Git Tag
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git tag "${{ steps.semver.outputs.next }}"
          git push origin "${{ steps.semver.outputs.next }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}