name: Build RuGrammarCheck Installer

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-2025
    timeout-minutes: 60
    strategy:
      matrix:
        quant: [int4, int8]

    steps:
      - name: Check out repo
        uses: nschloe/action-cached-lfs-checkout@v1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --no-cache-dir -r requirements-frozen.txt
          pip install pyinstaller

      - name: Prepare .env
        shell: pwsh
        run: |
          $quant = "${{ matrix.quant }}"
          @(
            "MODELS_DIR=models",
            "ONNX_MODEL_DIR=models/sage-fredt5-large-onnx",
            "PUNCT_MODEL_DIR=models/rupunct-big-onnx",
            "SAGE_QUANT=$quant"
          ) -join "`n" | Set-Content -Path .env

      - name: Build exe
        shell: cmd
        run: |
          pyinstaller --name RuGrammarCheck --onedir --console ^
            --collect-all onnxruntime ^
            --exclude-module tkinter ^
            --add-data ".env;." ^
            --add-data "models/sage-fredt5-large-onnx-${{ matrix.quant }};models/sage-fredt5-large-onnx" ^
            --add-data "models/rupunct-big-onnx;models/rupunct-big-onnx" ^
            --add-data "app/templates;app/templates" ^
            --add-data "app/static;app/static" ^
            launcher.py

      - name: Bundle NSSM
        shell: pwsh
        run: |
          Expand-Archive nssm.zip -DestinationPath nssm_extracted
          Copy-Item nssm_extracted\nssm-2.24-101-g897c7ad\win64\nssm.exe -Destination dist\RuGrammarCheck\nssm.exe

      - name: Copy installation scripts
        shell: pwsh
        run: |
          $src = "install-scripts"
          $dst = "dist\RuGrammarCheck"
          if (Test-Path $src) {
            Get-ChildItem -Path $src -File -Recurse | ForEach-Object {
              $rel = $_.FullName.Substring((Resolve-Path $src).Path.Length).TrimStart('\')
              $targetDir = Join-Path $dst (Split-Path $rel -Parent)
              if ($targetDir) {
                New-Item -ItemType Directory -Force -Path $targetDir | Out-Null
              }
              Copy-Item -LiteralPath $_.FullName -Destination (Join-Path $dst $rel) -Force
            }
          }

      - name: Copy clipboard scripts
        shell: pwsh
        run: |
          $src = "clipboard"
          $dst = "dist\RuGrammarCheck\clipboard"
          if (Test-Path $src) {
            Get-ChildItem -Path $src -File -Recurse | ForEach-Object {
              $rel = $_.FullName.Substring((Resolve-Path $src).Path.Length).TrimStart('\')
              $targetDir = Join-Path $dst (Split-Path $rel -Parent)
              if ($targetDir) {
                New-Item -ItemType Directory -Force -Path $targetDir | Out-Null
              }
              Copy-Item -LiteralPath $_.FullName -Destination (Join-Path $dst $rel) -Force
            }
          }
      
      - name: Derive version from tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ("${{ github.ref_type }}" -eq "tag" -and $tag -match "^v(.*)$") {
            $version = $Matches[1]
          } else {
            $version = "unknown"
          }
          echo "version=$version" >> $env:GITHUB_OUTPUT

      - name: Build Inno Setup installer
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
        with:
          path: RuGrammarCheck.iss
          options: "/O+ /DRuGrammarCheckVersion=${{ steps.version.outputs.version }}"

      - name: Install 7-Zip
        shell: pwsh
        run: |
          choco install 7zip -y

      - name: Create ZIP
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $quant = "${{ matrix.quant }}"
          $srcDir = "output"
          $outFile = "RuGrammarCheck-${version}-windows-${quant}.zip"

          & 'C:\Program Files\7-Zip\7z.exe' a -tzip -mx=9 -ssw `
            $outFile $srcDir\*

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: RuGrammarCheck-installer-${{ matrix.quant }}
          path: RuGrammarCheck-${{ steps.version.outputs.version }}-windows-${{ matrix.quant }}.zip
          if-no-files-found: error

      # Only runs when triggered by a version tag
      - name: Publish GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: RuGrammarCheck-*-windows-${{ matrix.quant }}.zip
          generate_release_notes: true